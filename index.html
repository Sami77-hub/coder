<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Chat 🔐</title>
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0d1f2d; color: #f5f1eb; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #c4794a; border-radius: 4px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes blink  { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .fade-up { animation: fadeUp 0.55s ease both; }
    .blink   { animation: blink 2s infinite; }

    .screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(26,74,107,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(196,121,74,0.18) 0%, transparent 55%),
        #0d1f2d;
    }
    .card {
      width:100%; max-width:460px;
      background: rgba(245,241,235,0.055);
      border: 1px solid rgba(245,241,235,0.1);
      border-radius: 1.5rem; padding: 2.2rem;
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 70px rgba(0,0,0,0.45);
    }
    .card.wide { max-width:680px; padding:0; overflow:hidden; }
    .logo { font-family:'Playfair Display',serif; font-size:2rem; text-align:center; color:#f5f1eb; margin-bottom:0.2rem; }
    .logo span { color:#c4794a; }
    .sub { font-size:0.68rem; letter-spacing:0.22em; text-transform:uppercase; color:rgba(245,241,235,0.3); text-align:center; margin-bottom:2rem; }
    label { display:block; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.15em; color:rgba(245,241,235,0.45); margin:1rem 0 0.35rem; }
    input {
      width:100%; background:rgba(245,241,235,0.07);
      border:1px solid rgba(245,241,235,0.14);
      color:#f5f1eb; font-family:'DM Sans',sans-serif;
      font-size:0.875rem; border-radius:0.75rem;
      padding:0.75rem 1rem; outline:none; transition:border-color 0.2s;
    }
    input:focus { border-color:#c4794a; }
    input::placeholder { color:rgba(245,241,235,0.22); }
    textarea {
      flex:1; background:rgba(245,241,235,0.07);
      border:1px solid rgba(245,241,235,0.14);
      color:#f5f1eb; font-family:'DM Sans',sans-serif;
      font-size:0.875rem; border-radius:0.75rem;
      padding:0.7rem 1rem; outline:none; resize:none;
      line-height:1.6; transition:border-color 0.2s;
    }
    textarea:focus { border-color:#c4794a; }
    textarea::placeholder { color:rgba(245,241,235,0.22); }
    textarea:disabled { opacity:0.3; cursor:not-allowed; }
    .btn {
      width:100%; margin-top:1.6rem;
      background:#c4794a; color:#f5f1eb;
      border:none; border-radius:0.75rem;
      padding:0.9rem; font-family:'DM Sans',sans-serif;
      font-size:0.9rem; font-weight:500;
      cursor:pointer; transition:all 0.2s;
    }
    .btn:hover { background:#e8dcc8; color:#1c1917; }
    .btn:disabled { opacity:0.45; cursor:not-allowed; }
    .avatars { display:flex; gap:0.45rem; flex-wrap:wrap; margin-top:0.4rem; }
    .av {
      font-size:1.45rem; padding:0.38rem;
      border-radius:0.6rem; border:2px solid transparent;
      background:rgba(245,241,235,0.05);
      cursor:pointer; opacity:0.48; transition:all 0.15s;
    }
    .av:hover { opacity:1; }
    .av.on { border-color:#c4794a; opacity:1; transform:scale(1.12); background:rgba(196,121,74,0.18); }
    .err { background:rgba(239,68,68,0.14); border:1px solid rgba(239,68,68,0.25); border-radius:0.7rem; padding:0.55rem 0.9rem; font-size:0.78rem; color:#fca5a5; margin-top:0.7rem; }
    .warn-bar { background:rgba(234,179,8,0.1); border:1px solid rgba(234,179,8,0.2); border-radius:0.7rem; padding:0.5rem 0.9rem; font-size:0.75rem; color:#fde68a; margin-bottom:0.6rem; }
    .note { font-size:0.7rem; color:rgba(245,241,235,0.27); margin-top:0.4rem; }
    .chat-head { display:flex; align-items:center; justify-content:space-between; padding:0.9rem 1.3rem; border-bottom:1px solid rgba(245,241,235,0.08); }
    .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }
    .dot.g { background:#4ade80; } .dot.r { background:#f87171; }
    .badge { font-size:0.62rem; font-weight:600; padding:0.18rem 0.5rem; border-radius:99px; }
    .b-ok     { background:rgba(74,222,128,0.14); color:#86efac; }
    .b-warn   { background:rgba(234,179,8,0.14);  color:#fde68a; }
    .b-danger { background:rgba(239,68,68,0.14);  color:#fca5a5; }
    .b-owner  { background:rgba(196,121,74,0.2);  color:#c4794a; }
    .pill { font-size:0.62rem; background:rgba(74,222,128,0.1); color:#86efac; padding:0.18rem 0.55rem; border-radius:99px; margin-left:3px; }
    .msgs { height:400px; overflow-y:auto; padding:1.2rem; display:flex; flex-direction:column; gap:1rem; }
    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:0.5rem; color:rgba(245,241,235,0.22); font-size:0.85rem; }
    .row      { display:flex; align-items:flex-end; gap:0.5rem; }
    .row.mine { flex-direction:row-reverse; }
    .meta     { font-size:0.63rem; color:rgba(245,241,235,0.28); margin-bottom:3px; }
    .meta.r   { text-align:right; }
    .bubble { padding:0.65rem 1rem; border-radius:1rem; font-size:0.85rem; line-height:1.65; word-break:break-word; white-space:pre-wrap; }
    .b-them { background:rgba(245,241,235,0.08); color:rgba(245,241,235,0.82); border-bottom-left-radius:4px; }
    .b-mine { background:rgba(196,121,74,0.78); color:#f5f1eb; border-bottom-right-radius:4px; }
    .chat-foot { padding:0.9rem 1.3rem; border-top:1px solid rgba(245,241,235,0.08); }
    .send-row { display:flex; gap:0.5rem; align-items:flex-end; }
    .send-btn { width:42px; height:42px; background:#c4794a; color:#f5f1eb; border:none; border-radius:0.75rem; font-size:1.1rem; cursor:pointer; flex-shrink:0; transition:all 0.2s; }
    .send-btn:hover { background:#e8dcc8; color:#1c1917; }
    .send-btn:disabled { opacity:0.28; cursor:not-allowed; }
    .hint { font-size:0.62rem; color:rgba(245,241,235,0.18); text-align:right; margin-top:4px; }
  </style>
</head>
<body>

<!-- DENIED -->
<div class="screen fade-up" id="denied-screen" style="display:none">
  <div class="card" style="text-align:center">
    <div style="font-size:4rem;margin-bottom:1rem">🔒</div>
    <div class="logo">Access <span>Denied</span></div>
    <div class="sub" style="margin-bottom:1rem">Private Chat</div>
    <p id="denied-msg" style="color:rgba(245,241,235,0.5);font-size:0.85rem;line-height:1.75"></p>
    <button class="btn" onclick="showLogin()">← Wapas Jao</button>
  </div>
</div>

<!-- LOGIN -->
<div class="screen fade-up" id="login-screen">
  <div class="card">
    <div style="text-align:center;font-size:2.2rem;margin-bottom:0.4rem">🔐</div>
    <div class="logo">Wander<span>.</span></div>
    <div class="sub">Private Chat Board</div>
    <label>Avatar Chunein</label>
    <div class="avatars" id="avatar-btns"></div>
    <label>Aapka Naam</label>
    <input id="nameInput" placeholder="Jaise: Rania Khan" onkeydown="if(event.key==='Enter')doLogin()" />
    <label>Gmail Address</label>
    <input id="gmailInput" type="email" placeholder="example@gmail.com" onkeydown="if(event.key==='Enter')doLogin()" />
    <p class="note">🔒 Yeh private 2-person chat hai — baaki sab ko access nahi</p>
    <div id="login-err" style="display:none" class="err"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">🧳 Enter Karen →</button>
  </div>
</div>

<!-- CHAT -->
<div class="screen" id="chat-screen" style="display:none">
  <div class="card wide fade-up">
    <div class="chat-head">
      <div style="display:flex;align-items:center;gap:0.4rem">
        <span class="dot blink r" id="connDot"></span>
        <span id="connTxt" style="font-size:0.72rem;color:rgba(245,241,235,0.45)">Connecting...</span>
        <span id="ownerBadge" class="badge b-owner" style="display:none">👑 Owner</span>
        <span id="pills"></span>
      </div>
      <div style="display:flex;align-items:center;gap:0.4rem">
        <span id="myAv" style="font-size:1.15rem"></span>
        <span id="myNm" style="font-size:0.72rem;color:rgba(245,241,235,0.55)"></span>
        <span id="limitBadge" class="badge b-ok">2 left</span>
      </div>
    </div>
    <div class="msgs" id="msgs">
      <div class="empty" id="emptyEl"><span style="font-size:2.5rem">💬</span>Pehla message bhejein!</div>
    </div>
    <div class="chat-foot">
      <div id="topErr"   class="err"      style="display:none;margin-bottom:0.6rem"></div>
      <div id="warnBar"  class="warn-bar" style="display:none">⚠️ Sirf <strong>1 message</strong> bacha hai!</div>
      <div id="limitErr" class="err"      style="display:none;margin-bottom:0.6rem"></div>
      <div class="send-row">
        <span id="sendAv" style="font-size:1.5rem;flex-shrink:0"></span>
        <textarea id="msgInput" rows="2" placeholder="Kuch bhi likhein... (Enter = send)" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
      </div>
      <div class="hint" id="hint">Shift+Enter = new line | 0/2 messages sent</div>
    </div>
  </div>
</div>

<script>
const ABLY_KEY  = "7D-sqg.Y-CsjQ:HW_jkckww6q-hWeZuwe7p0zrUm0k5rNoqcyjYeeRtP0";
const OWNER     = "s14930931@gmail.com";
const LIMIT     = 2;
const AVATARS   = ["🧳","🌍","🏄","🗺️","✈️","🏔️","🌺","🎒"];
const HIDDEN    = "Samia"; // Yeh naam kabhi nahi dikhega

let selAv = "🧳";
let me    = {};
let count = 0;
let ably, ch, prCh;

// ── LocalStorage ──
function getLS() {
  try { return JSON.parse(localStorage.getItem("wc") || "{}"); } catch { return {}; }
}
function setLS(d) { localStorage.setItem("wc", JSON.stringify(d)); }

// ── Avatars ──
const avDiv = document.getElementById("avatar-btns");
AVATARS.forEach(a => {
  const b = document.createElement("button");
  b.className   = "av" + (a === selAv ? " on" : "");
  b.textContent = a;
  b.onclick = () => {
    selAv = a;
    document.getElementById("loginBtn").textContent = a + " Enter Karen →";
    document.querySelectorAll(".av").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
  };
  avDiv.appendChild(b);
});

// ── Screen helpers ──
function showLogin()  { hide("denied-screen"); hide("chat-screen");  show("login-screen"); }
function showDenied(m){ document.getElementById("denied-msg").textContent = m; hide("login-screen"); hide("chat-screen"); show("denied-screen"); }
function showChat()   { hide("login-screen");  hide("denied-screen"); show("chat-screen"); }
function show(id)     { document.getElementById(id).style.display = "flex"; }
function hide(id)     { document.getElementById(id).style.display = "none"; }

// ── Login ──
function doLogin() {
  const name  = document.getElementById("nameInput").value.trim();
  const gmail = document.getElementById("gmailInput").value.trim().toLowerCase();
  const err   = document.getElementById("login-err");
  err.style.display = "none";

  if (!name)  { err.textContent = "⚠️ Naam zaroor likhein."; err.style.display = "block"; return; }
  if (!/^[^\s@]+@gmail\.com$/.test(gmail)) { err.textContent = "⚠️ Sirf @gmail.com likhein."; err.style.display = "block"; return; }

  const isOwner = gmail === OWNER;
  const st = getLS();

  if (!isOwner) {
    if (st.seat && gmail !== st.seat)        { showDenied("Yeh private chat hai — aapko access nahi. 🚫"); return; }
    if (st.locked && gmail === st.seat)      { showDenied("Aap dobara join nahi kar sakte. 🚫"); return; }
    if (!st.seat) { st.seat = gmail; setLS(st); }
  }

  me = { name, gmail, avatar: selAv, isOwner };
  const btn = document.getElementById("loginBtn");
  btn.disabled    = true;
  btn.textContent = "Connecting...";
  connect();
}

// ── Ably ──
function connect() {
  ably = new Ably.Realtime({ key: ABLY_KEY });
  ch   = ably.channels.get("wander-chat");
  prCh = ably.channels.get("wander-presence");

  ably.connection.on("connected",    () => { setConn(true);  setupChat(); });
  ably.connection.on("disconnected", () =>   setConn(false));
  ably.connection.on("failed",       () =>   setConn(false));
}

function setConn(ok) {
  document.getElementById("connDot").className = "dot blink " + (ok ? "g" : "r");
  document.getElementById("connTxt").textContent = ok ? "Live" : "Connecting...";
}

function setupChat() {
  showChat();
  document.getElementById("myAv").textContent = me.avatar;
  document.getElementById("myNm").textContent = me.name;
  document.getElementById("sendAv").textContent = me.avatar;

  if (me.isOwner) {
    document.getElementById("ownerBadge").style.display = "inline";
    document.getElementById("limitBadge").textContent   = "∞ Unlimited";
    document.getElementById("limitBadge").className     = "badge b-owner";
    document.getElementById("hint").textContent         = "Shift+Enter = new line | ∞ messages";
  }

  ch.subscribe("msg", m => addMsg(m.data));

  prCh.presence.enter({ name: me.name, gmail: me.gmail });
  prCh.presence.subscribe(() => updatePills());
  updatePills();

  window.addEventListener("beforeunload", () => {
    if (!me.isOwner) {
      const st = getLS();
      st.locked = true;
      setLS(st);
    }
  });

  setTimeout(() => document.getElementById("msgInput").focus(), 200);
}

// ── Online pills ──
function updatePills() {
  prCh.presence.get((err, members) => {
    if (err) return;
    const el = document.getElementById("pills");
    el.innerHTML = "";
    members.forEach(m => {
      if (m.data.name === HIDDEN) return;
      if (m.data.gmail === OWNER) return;
      const s = document.createElement("span");
      s.className   = "pill";
      s.textContent = m.data.name;
      el.appendChild(s);
    });
  });
}

// ── Send ──
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function sendMsg() {
  const txt = document.getElementById("msgInput").value.trim();
  if (!txt) return;
  if (!me.isOwner && count >= LIMIT) return;

  ch.publish("msg", {
    id:       Date.now(),
    gmail:    me.gmail,
    username: me.name,
    avatar:   me.avatar,
    text:     txt,
    time:     new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }),
  });

  document.getElementById("msgInput").value = "";

  if (!me.isOwner) {
    count++;
    updateLimit();
  }
}

function updateLimit() {
  if (me.isOwner) return;
  const rem    = LIMIT - count;
  const badge  = document.getElementById("limitBadge");
  const warn   = document.getElementById("warnBar");
  const lerr   = document.getElementById("limitErr");
  const inp    = document.getElementById("msgInput");
  const btn    = document.getElementById("sendBtn");
  document.getElementById("hint").textContent = `Shift+Enter = new line | ${count}/${LIMIT} messages sent`;

  if (count >= LIMIT) {
    badge.textContent = "❌ 0 left"; badge.className = "badge b-danger";
    warn.style.display = "none";
    lerr.textContent = `🚫 Aapki ${LIMIT} messages ki limit khatam ho gayi.`;
    lerr.style.display = "block";
    inp.disabled = true; inp.placeholder = "Limit khatam...";
    btn.disabled = true;
    const st = getLS(); st.locked = true; setLS(st);
  } else if (rem === 1) {
    badge.textContent = "1 left"; badge.className = "badge b-warn";
    warn.style.display = "block";
  } else {
    badge.textContent = rem + " left"; badge.className = "badge b-ok";
  }
}

// ── Add message ──
function addMsg(d) {
  const box = document.getElementById("msgs");
  const emp = document.getElementById("emptyEl");
  if (emp) emp.remove();

  const mine = d.gmail === me.gmail;
  const row  = document.createElement("div");
  row.className = "row" + (mine ? " mine" : "");

  const av = document.createElement("span");
  av.style.cssText = "font-size:1.4rem;flex-shrink:0";
  av.textContent   = d.avatar;

  const inner = document.createElement("div");
  inner.style.maxWidth = "74%";

  const meta = document.createElement("div");
  meta.className   = "meta" + (mine ? " r" : "");
  meta.textContent = (mine ? "Aap" : (d.username === HIDDEN ? "🔒 Anonymous" : d.username)) + " · " + d.time;

  const bub = document.createElement("div");
  bub.className   = "bubble " + (mine ? "b-mine" : "b-them");
  bub.textContent = d.text;

  inner.appendChild(meta);
  inner.appendChild(bub);
  row.appendChild(av);
  row.appendChild(inner);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
